<!DOCTYPE html>
<html>
<head>
  <title>SPACE Dashboard V2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; background:#0b0f1a; color:#fff; padding:20px; }
    h1 { color:#4da3ff; }
    .card { background:#121a2b; padding:15px; margin:10px 0; border-radius:10px; }
    .green { color:#00ff9c; }
    .yellow { color:#ffd166; }
    .red { color:#ff4d4d; }
    button { padding:10px; margin:5px; cursor:pointer; }
  </style>
</head>

<body>

<h1>🚀 SPACE DASHBOARD V2.0</h1>

<button onclick="loadAll()">🔄 Refresh Data</button>

<div class="card">
  <h2>🌌 Allocation Engine</h2>
  <div id="allocation"></div>
</div>

<div class="card">
  <h2>📊 Live Prices</h2>
  <div id="prices"></div>
</div>

<div class="card">
  <h2>🧠 Ring Review</h2>
  <div id="ringReview"></div>
</div>

<div class="card">
  <h2>🛰️ IPO Watch</h2>
  <div id="ipo"></div>
</div>

<script>
const API = "https://space-dashboard-worker.cory-lesley.workers.dev";

const portfolio = {
  RKLB: { shares: 10 },
  PL: { shares: 10 },
  MARS: { shares: 10 }
};

const targets = {
  core: 45,
  ring2: 22,
  ring3: 18,
  ring4: 15
};

const universe = {
  RKLB:{ ring:"core", tier:"A" },
  ASTS:{ ring:"core", tier:"A" },
  RDW:{ ring:"core", tier:"A" },

  PL:{ ring:"ring2", tier:"A" },
  IRDM:{ ring:"ring2", tier:"A" },
  MARS:{ ring:"ring2", tier:"B" },

  BKSY:{ ring:"ring3", tier:"A" },
  LUNR:{ ring:"ring3", tier:"A" },
  AERG:{ ring:"ring3", tier:"B" },
  SPCE:{ ring:"ring3", tier:"C" },

  KBR:{ ring:"ring4", tier:"B" },
  NOK:{ ring:"ring4", tier:"B" },
  HLIO:{ ring:"ring4", tier:"B" },
  VLD:{ ring:"ring4", tier:"C" }
};

let prices = {};

async function loadAll() {
  await loadPrices();
  calculateAllocation();
  buildRingReview();
  buildIPO();
}

async function loadPrices() {
  try {
    const res = await fetch(API + "/quotes");
    const data = await res.json();
    prices = data.quotes || {};
    renderPrices();
  } catch(e) {
    document.getElementById("prices").innerHTML = "⚠️ Failed to load";
  }
}

function renderPrices() {
  let html = "";
  for (let t in prices) {
    html += `<div>${t}: $${prices[t]}</div>`;
  }
  document.getElementById("prices").innerHTML = html;
}

function calculateAllocation() {
  let totals = { core:0, ring2:0, ring3:0, ring4:0 };
  let totalValue = 0;

  for (let t in portfolio) {
    let price = prices[t] || 0;
    let value = price * portfolio[t].shares;
    totalValue += value;

    let ring = universe[t]?.ring;
    if (ring) totals[ring] += value;
  }

  let html = "";

  for (let r in totals) {
    let pct = totalValue ? (totals[r]/totalValue*100).toFixed(1) : 0;
    let target = targets[r];
    let status = pct < target ? "🔴 Underweight" : "🟢 OK";

    html += `<div>${r.toUpperCase()}: ${pct}% (Target ${target}%) — ${status}</div>`;
  }

  document.getElementById("allocation").innerHTML = html;
}

function buildRingReview() {
  document.getElementById("ringReview").innerHTML =
    "🟢 PL & BKSY → Promotion Watch<br>🔴 SPCE → Risk Monitoring";
}

function buildIPO() {
  document.getElementById("ipo").innerHTML =
    "🚀 SpaceX → Core if IPO<br>🛰️ Impulse Space → Ring 2 candidate";
}

loadAll();
</script>

</body>
</html>
