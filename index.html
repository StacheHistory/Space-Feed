<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPACE Command Center</title>
<style>
body{font-family:Arial;background:#0b1220;color:#e5e7eb;margin:0}
.tabs{display:flex;gap:10px;padding:10px;background:#111827}
.tab{padding:10px 14px;background:#1f2937;border-radius:8px;cursor:pointer}
.tab.active{background:#2563eb}
.panel{display:none;padding:20px}
.panel.active{display:block}
input,select,button{padding:8px;border-radius:6px;margin:5px}
table{width:100%;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #374151}
.green{color:#22c55e} .red{color:#ef4444}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="show('dashboard',this)">Dashboard</div>
<div class="tab" onclick="show('portfolio',this)">Portfolio</div>
<div class="tab" onclick="show('trade',this)">Add Trade</div>
<div class="tab" onclick="show('settings',this)">Settings</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel active">
<h2>Solar System Progress</h2>
<div id="rings"></div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="panel">
<h2>Portfolio</h2>
<table>
<thead><tr><th>Ticker</th><th>Shares</th><th>Avg Cost</th><th>Price</th><th>Value</th><th>P/L</th></tr></thead>
<tbody id="portfolioTable"></tbody>
</table>
</div>

<!-- ADD TRADE -->
<div id="trade" class="panel">
<h2>Add Trade</h2>

<select id="ticker"></select>
<input id="shares" placeholder="Shares">
<input id="price" placeholder="Price">
<button onclick="addTrade()">Add</button>

<h3>History</h3>
<table><tbody id="history"></tbody></table>

</div>

<!-- SETTINGS -->
<div id="settings" class="panel">
<h2>Live Setup</h2>
<input id="worker" placeholder="Cloudflare Worker URL">
<button onclick="save()">Save</button>
<button onclick="refresh()">Refresh</button>
</div>

<script>

const TICKERS=["RKLB","ASTS","RDW","IRDM","PL","BKSY","LUNR","VSAT","HON"]

const TARGET={
RKLB:130,ASTS:120,RDW:180,
IRDM:75,PL:100,
BKSY:85,LUNR:80,VSAT:40,
HON:25
}

const RINGS={
Core:["RKLB","ASTS","RDW"],
Revenue:["IRDM","PL"],
Optional:["BKSY","LUNR","VSAT"],
Stabilizers:["HON"]
}

let quotes={}

function show(id,el){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
el.classList.add('active')
if(id==="trade") populateDropdown()
renderAll()
}

function populateDropdown(){
let sel=document.getElementById("ticker")
sel.innerHTML=TICKERS.map(t=>`<option>${t}</option>`).join("")
}

function getTrades(){
return JSON.parse(localStorage.getItem("trades")||"[]")
}

function saveTrades(t){localStorage.setItem("trades",JSON.stringify(t))}

function positions(){
let p={}
TICKERS.forEach(t=>p[t]={shares:0,avg:0})
getTrades().forEach(tr=>{
let c=p[tr.ticker]
let total=c.shares+tr.shares
c.avg=(c.shares*c.avg+tr.shares*tr.price)/total
c.shares=total
})
return p
}

function addTrade(){
let t=document.getElementById("ticker").value
let s=Number(shares.value)
let p=Number(price.value)

let trades=getTrades()
trades.unshift({ticker:t,shares:s,price:p})
saveTrades(trades)

renderAll()
}

function renderHistory(){
let h=getTrades()
history.innerHTML=h.map(x=>
`<tr><td>${x.ticker}</td><td>${x.shares}</td><td>${x.price}</td></tr>`
).join("")
}

function renderPortfolio(){
let pos=positions()
portfolioTable.innerHTML=TICKERS.map(t=>{
let p=pos[t]
let price=quotes[t]||0
let val=p.shares*price
let cost=p.shares*p.avg
let pnl=val-cost
return `<tr>
<td>${t}</td>
<td>${p.shares}</td>
<td>${p.avg.toFixed(2)}</td>
<td>${price}</td>
<td>${val.toFixed(0)}</td>
<td class="${pnl>0?'green':'red'}">${pnl.toFixed(0)}</td>
</tr>`
}).join("")
}

function renderRings(){
let pos=positions()
rings.innerHTML=Object.keys(RINGS).map(r=>{
let cur=RINGS[r].reduce((a,t)=>a+pos[t].shares,0)
let tar=RINGS[r].reduce((a,t)=>a+TARGET[t],0)
let pct=(cur/tar*100)||0
return `<div>${r}: ${pct.toFixed(1)}%</div>`
}).join("")
}

async function refresh(){
let base=localStorage.getItem("worker")
if(!base)return

let q=await fetch(base+"/quotes").then(r=>r.json())
quotes=q.quotes||{}
renderAll()
}

function save(){
localStorage.setItem("worker",worker.value)
}

function renderAll(){
renderPortfolio()
renderHistory()
renderRings()
}

populateDropdown()
renderAll()

</script>

</body>
</html>
